name: CodeQL

# GitHub-native static analysis (SAST), complementing bandit. Results land in the repo's
# Security > Code scanning tab. Free for public repositories.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "27 4 * * 1" # weekly, so a newly-disclosed pattern is caught even without a push

jobs:
  analyze:
    name: Analyze (python)
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      contents: read
    steps:
      - uses: actions/checkout@v7
      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: python
          queries: security-and-quality
      - name: Analyze
        uses: github/codeql-action/analyze@v3
