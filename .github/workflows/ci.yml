name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - run: pip install -e '.[dev]'
      - name: Lint (ruff)
        run: |
          ruff format --check .
          ruff check .
      - name: Type-check (mypy --strict)
        run: mypy
      - name: Test with coverage (pytest, fail under 100%)
        run: pytest --cov --cov-report=term-missing --cov-report=xml --cov-fail-under=100
      - name: Upload coverage to Codecov
        if: matrix.python-version == '3.12'
        uses: codecov/codecov-action@v7
        with:
          files: coverage.xml
          fail_ci_if_error: false

  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: SAST (bandit)
        run: |
          pip install bandit
          bandit -q -c pyproject.toml -r src
      # Audit THIS project's dependency closure (currently zero runtime deps), not the ambient venv,
      # so the "dependencies: none" claim is verified and any future dep is scanned automatically.
      - uses: pypa/gh-action-pip-audit@v1.1.0
        with:
          inputs: .
      # SBOM (CycloneDX) of the installed environment. Reproducible from this commit;
      # git-ignored, uploaded as a non-blocking artifact. Supply-chain evidence (SSDF PS.3).
      - name: Software bill of materials (SBOM)
        run: |
          pip install cyclonedx-bom
          cyclonedx-py environment -o sbom.cdx.json
      - name: Upload SBOM artifact
        uses: actions/upload-artifact@v4
        with:
          name: sbom-cyclonedx
          path: sbom.cdx.json
          if-no-files-found: warn
